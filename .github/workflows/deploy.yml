# Автодеплой на хостинг по FTP при пуше в main или feature/dashboard-load-optimization.
# Секреты: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD.
# При ошибке ECONNRESET (data socket): хостинг может требовать FTPS — добавьте protocol: ftps.

name: Deploy to FTP

on:
  push:
    branches:
      - main
      - feature/dashboard-load-optimization
  workflow_dispatch:

env:
  FTP_SERVER_DIR: /home/if592995/panel.account-factory.site/www/
  # Убирает предупреждение о Node.js 20 (actions переходят на Node 24)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Пишем SHA коммита в файл — видно на домене, какая версия реально залита.
      # Открой https://panel.account-factory.site/deployed-version.txt после деплоя.
      - name: Write deployed version marker
        run: |
          {
            echo "commit: ${{ github.sha }}"
            echo "short:  $(echo ${{ github.sha }} | cut -c1-7)"
            echo "branch: ${{ github.ref_name }}"
            echo "run:    ${{ github.run_number }}"
            echo "time:   $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > deployed-version.txt
          cat deployed-version.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ env.FTP_SERVER_DIR }}
          local-dir: ./
          # ВРЕМЕННО: разовая перезаливка всего. Sync-state на сервере разъехался
          # с реальными файлами (часть ассетов застряла на версии от 24 марта),
          # поэтому нужен один полный прогон. После успешного деплоя — УБРАТЬ эту строку.
          dangerous-clean-slate: true
          # Устойчивость при нестабильном FTP (ECONNRESET на data socket)
          security: loose
          timeout: 120000
          log-level: verbose
          exclude: |
            - **/.git*
            - **/.github
            - **/node_modules
            - **/.env
            - **/.cursor
            - **/*.log
            - **/Thumbs.db
            - **/.DS_Store
            - **/.optimization_applied
